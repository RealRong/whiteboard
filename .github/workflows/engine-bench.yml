name: Engine Bench

on:
  pull_request:
    paths:
      - 'packages/whiteboard-core/**'
      - 'packages/whiteboard-engine/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/engine-bench.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/whiteboard-core/**'
      - 'packages/whiteboard-engine/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/engine-bench.yml'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Engine Bench Check
        run: pnpm --filter @whiteboard/engine run bench:check
